<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .wrap {
        position: relative;
        height: 400px;
        background: skyblue;
        overflow: hidden;
        max-width: 1440px;
        margin: 0 auto;
      }

      .container {
        width: 100%;
        max-width: 560px;
        position: absolute;
        left: 0;
        right: 0;
        margin: 0 auto;
      }

      .container::before {
        content: "";
        display: block;
        width: 100%;
        height: 0;
        padding-top: 56.25%;
      }

      .video {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="container">
        <div class="video">
          <iframe
            width="100%"
            height="100%"
            src="https://www.youtube.com/embed/IOtpNmiG46I"
            title="YouTube video player"
            frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen
          ></iframe>
        </div>
      </div>
    </div>
  </body>
</html>
